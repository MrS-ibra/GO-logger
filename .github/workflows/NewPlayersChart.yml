name: Send 7-Day Join Chart to Discord

on:
  workflow_dispatch:

jobs:
  send-join-chart:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick

      - name: Run SendJoinChart.ps1
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: pwsh ./NewPlayersChart.ps1.ps1 -Days 7
