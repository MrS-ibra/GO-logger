name: Track Active Players

on:
  workflow_dispatch:

jobs:
  run-tracker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Track & Archive Players
        shell: pwsh
        env:
          GIT_USER:  IbraBot
          GIT_EMAIL: ibra@example.com
        run: |
          # configure git identity
          git config user.name  $env:GIT_USER
          git config user.email $env:GIT_EMAIL

          $log = 'ActivePlayers.txt'
          $arc = 'archive'

          # ensure the log exists
          if (-not (Test-Path $log)) {
            New-Item $log -ItemType File | Out-Null
          }

          # on the 1st, archive last month
          if ((Get-Date).Day -eq 1) {
            $prev = (Get-Date).AddMonths(-1)
            $dir  = "$arc/$($prev.ToString('yyyy-MM'))"
            if (-not (Test-Path $dir)) {
              New-Item $dir -ItemType Directory | Out-Null
            }
            Move-Item -Path $log `
                      -Destination "$dir/ActivePlayers-$($prev.ToString('yyyy-MM-dd')).txt" `
                      -Force
            New-Item $log -ItemType File | Out-Null
          }

          # fetch and parse player names
          $html = (Invoke-WebRequest 'https://www.playgenerals.online/players').Content
          [regex]::Matches($html, "<th\s+scope=['""]row['""]>(.*?)</th>") |
            ForEach-Object {
              $name    = $_.Groups[1].Value.Trim()
              $pattern = '^' + [regex]::Escape($name) + '$'

              if (-not (Select-String -Path $log -Pattern $pattern -Quiet)) {
                Add-Content -Path $log -Value $name
              }
            }

          # commit live log and any archive files
          git add $log
          if (Test-Path $arc) { git add $arc }
          git commit -m "Update active players + archive if needed" || echo "No changes"
          git push                                      || echo "Push skipped"
