name: Player Stats Monitor

on:
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Run Tracker
        # inject your webhook secret into the script's environment
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: pwsh ./PlayerStats.ps1

      - name: Commit Log
        run: |
          git config --global user.name "IbraBot"
          git config --global user.email "ibra@example.com"
          git add NewStats.txt StatsHistory.txt
          git commit -m "Update stats logs" || echo "No changes to commit"
          git push || true
