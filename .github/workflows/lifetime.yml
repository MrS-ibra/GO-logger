name: Lifetime Tracker

on:
  schedule:
    - cron: '*/25 * * * *'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Install PowerShell 7.4.1
        run: |
          wget https://github.com/PowerShell/PowerShell/releases/download/v7.4.1/powershell-7.4.1-linux-x64.tar.gz
          mkdir ~/powershell
          tar -xvf ./powershell-7.4.1-linux-x64.tar.gz -C ~/powershell

      - name: Checkout Repo
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Run Tracker
        run: ~/powershell/pwsh "./TotalLifetimePlayers.ps1"

      - name: Commit Log
        run: |
          git config user.name "IbraBot"
          git config user.email "ibra@example.com"
          git add lifetime_log.txt
          git commit -m "Update lifetime log"
          git push

      - name: Send to Discord
        env:
        DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
        message=$(tac lifetime_log.txt | grep -m 4 "$(date +'%Y-%m-%d')" | tac | \
        sed 's/Total Lifetime Players: \([0-9]\+\)/Total Lifetime Players: **\1**/' | \
        sed 's/There are \([0-9]\+\) online players/There are **\1** online players/' | \
        sed 's/Peak Online Today: \([0-9]\+\)/Peak Online Today: **\1**/' | \
        sed 's/A total of \([0-9]\+\)/A total of **\1**/' | \
        awk '{print}' ORS='\\n')
        curl -H "Content-Type: application/json" \
         -X POST \
         -d "{\"content\": \"$message\"}" \
         $DISCORD_WEBHOOK
