name: Lifetime Stats Tracker

on:
  schedule:
    - cron: '*/30 * * * *'  # existing cron if you had one
  workflow_dispatch:
    inputs:
      triggerSource:
        description: 'External trigger source'
        required: false
        default: 'manual-or-cron'

jobs:
  lifetime:
    runs-on: ubuntu-latest

    steps:
      - name: Format timestamp
        id: time
        run: echo "timestamp=$(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> $GITHUB_OUTPUT

      # ⬇️ Your existing telemetry, parsing, and Discord logic stays untouched
      - name: Run telemetry script
        run: |
          # Your existing PowerShell or batch logic goes here
          echo "Running telemetry..."

      - name: Send Discord Message
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          curl -H "Content-Type: application/json" \
               -X POST \
               -d "{\"content\": \"📊 Lifetime stats updated via **${{ github.event.inputs.triggerSource }}** at `${{ steps.time.outputs.timestamp }}`\"}" \
               "$DISCORD_WEBHOOK"
