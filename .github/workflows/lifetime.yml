name: Lifetime Tracker

on:
  schedule:
    - cron: '*/1 * * * *'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Install PowerShell 7.4.1
        run: |
          wget https://github.com/PowerShell/PowerShell/releases/download/v7.4.1/powershell-7.4.1-linux-x64.tar.gz
          mkdir ~/powershell
          tar -xvf ./powershell-7.4.1-linux-x64.tar.gz -C ~/powershell

      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Run Tracker
        run: ~/powershell/pwsh "./TotalLifetimePlayers.ps1"

      - name: Commit Log
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config user.name "IbraBot"
          git config user.email "ibra@example.com"
          git remote set-url origin https://x-access-token:${GH_PAT}@github.com/${{ github.repository }}
          git add lifetime_log.txt
          git commit -m "Update lifetime count"
          git push
