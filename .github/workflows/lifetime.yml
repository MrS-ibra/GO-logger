name: Lifetime Tracker

on:
  schedule:
    - cron: '*/1 * * * *'  # Every 1 minute

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Install PowerShell
        run: sudo apt-get install -y powershell

      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Run Tracker
        run: pwsh "./TotalLifetimePlayers.ps1"

      - name: Configure Git
        run: |
          git config user.name "IbraBot"
          git config user.email "ibra@example.com"

      - name: Commit Log
        run: |
          git add lifetime_log.txt
          git commit -m "Update lifetime count"
          git push
